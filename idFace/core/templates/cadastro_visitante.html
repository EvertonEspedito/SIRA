{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRA - Cadastro de Visitante</title>


    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div class="container">

        <div class="left-side">

            <header>
                <div class="back-button"> <a href="{% url 'dashboard' %}"><img src="{% static 'img/left_arrow.png' %}"> </a> </div>
            </header>

            <div class="login-box">

                <h2>Cadastrar Visitante</h2>

                <form>

                    <input
                        type="text"
                        placeholder="CPF"
                    >

                   <input
                        type="text"
                        placeholder="PRIMEIRO NOME"
                    >
                    <input
                        type="text"
                        placeholder="SOBRENOME"
                    >
                    <input
                        type="text"
                        placeholder="NÚMERO DE TELEFONE"
                    >


                    <button type="submit">
                        Confirmar
                    </button>

                   

                </form>

            </div>

        </div>

        <div class="right-side">

            <img
                src="{% static 'img/estudante.png' %}"
                alt="Estudante"
            >

        </div>

    </div>

</body>
</html>
